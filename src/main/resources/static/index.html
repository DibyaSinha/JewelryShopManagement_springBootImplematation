<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandi Fashion - Jewelry Management</title>
    <link rel="icon" type="image/png" href="images/CF_LOGO1.png">
<!--    <img src="/images/ChatGPT Image Jun 15, 2026, 01_35_52 PM_logo.png" alt="CF Logo" class="logo">-->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="login-container" class="auth-container">
        <div class="auth-card">
            <div class="brand-header">
                <img src="images/logo.png" alt="Chandi Fashion Logo" class="brand-logo">
            </div>
            <p>Jewelry Management System</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-container">
                        <input type="password" id="password" required placeholder="Enter password">
                        <i class="fas fa-eye-slash toggle-password" id="togglePassword"></i>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <div id="login-message" class="message"></div>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
<!--                <h3><i class="fas fa-gem"></i> Chandi Fashion</h3>-->
                <img src="images/logo.png" alt="Chandi Fashion Logo" class="innerBrand-logo">
            </div>
            <nav class="sidebar-nav">
                <ul id="sidebar-menu">
                    <!-- Dynamic Menu based on role -->
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <span id="user-display-name">User</span>
                    <span id="user-role" class="badge">Role</span>
                </div>
                <button id="logout-btn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="content">
            <header class="content-header">
                <h2 id="view-title">Dashboard</h2>
                <div id="today-rates-bar" class="rates-bar">
                    <!-- Rates will be injected here -->
                </div>
            </header>

            <section id="view-content" class="view-section">
                <!-- Content will be injected here -->
            </section>
        </main>
    </div>

    <div id="modal-container" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
