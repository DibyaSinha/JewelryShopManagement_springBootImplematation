###########################################################
# DATABASE CONFIGURATION
###########################################################

# Prefer setting DB_URL, DB_USERNAME and DB_PASSWORD as environment variables (Render/TiDB Cloud).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/jewelry_management?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
# Optionally set username/password via env vars; if DB_URL includes credentials, these can remain empty.
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

###########################################################
# JPA / HIBERNATE
###########################################################

# In production prefer 'validate' to avoid accidental schema changes. Override with SPRING_JPA_HIBERNATE_DDL_AUTO env var.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

###########################################################
# SERVER
###########################################################

server.port=${PORT:8081}

###########################################################
# HIKARI CONNECTION POOL
###########################################################

spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

###########################################################
# LOGGING
###########################################################

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql=INFO
logging.level.org.example=INFO

###########################################################
# JACKSON
###########################################################

spring.jackson.serialization.indent-output=true

###########################################################
# SPRING MVC
###########################################################

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

###########################################################
# FILE UPLOAD
###########################################################

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# End of file